services:
  py3:
    build:
      context: ./py3
      dockerfile: Dockerfile
    image: colab-full:2026.04
    container_name: colab-full
    shm_size: "100gb"
    restart: unless-stopped
    working_dir: /workspace
    command: >
      jupyter-lab
      --allow-root
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --notebook-dir=/workspace
    ports:
      - "3141:8888"
    volumes:
      - ./py3/root_jupyter:/root/.jupyter
      - ./workspace:/workspace
    environment:
      TZ: Asia/Tokyo
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      TF_CPP_MIN_LOG_LEVEL: "2"
    gpus: all
